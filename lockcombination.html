<!DOCTYPE html>
<html>

<head>
    <title>Lock Combination</title>
    <link rel="stylesheet" href="lockcombination.css">
</head>

<body>
    <div id="game">
        <h1>Lock Combination</h1>

        <p id="message">
            Solve the clues to unlock the safe 
        </p>

        <div id="clues">
    
    </div>
    <h2 id="round"></h2>

    <h2 id="timer"></h2>
    
    <h2 id="code">
        - - - -
        </h2> 
        

    <div id="keypad">
        <button class="number">1</button>
        <button class="number">2</button>
        <button class="number">3</button>

        <button class="number">4</button>
        <button class="number">5</button>
        <button class="number">6</button>

        <button class="number">7</button>
        <button class="number">8</button>
        <button class="number">9</button>

        <button class="number">0</button>

    </div>

    <div id="controls">

        <button id="clear">
            CLEAR
        </button>


        <button id="enter">
            ENTER
        </button>


        <button id="restart">
            NEW PUZZLE
        </button>

    </div>


</div>


<script src="lockcombination.js"></script>

</body>

</html>
