<html>
<head>
<style>
.container {
  display: grid;
  background-color: dodgerblue;
  padding: 10px;
  width: 500px;
  height: 500px;
}
.container div {
  background-color: #f1f1f1;
  border: 1px solid black;
  padding: 1px;
}
.overlay {
  position: fixed;
  display: none; 
  width: 100%;
  height: 100%; 
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: rgba(0,0,0,0.5);
  z-index: 2; 
  cursor: pointer;
}
.overlay * {
  position: relative;
  left: 50%;
  top: 50%;
  font-size: xx-large;
    
}
.parent{
  width: 500px;
  height: 500px;
  margin-left:auto;
  margin-right:auto;
}
</style>
</head>
<body>
  <div id="overlayLose" class="overlay">
      <div>Game Over</div>
      <button id="button">Restart</button>
  </div>
  <div id="overlayWin" class="overlay">
      <div>You Win</div>
  </div>
  <div class="parent">
    <input type="checkbox" id="mode">Mark as mine</input>
    <div class="container" id="grid"></div>
    <script src="Minesweepers_minigame.js"></script>
</div>


</body>
</html>
