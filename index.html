<!DOCTYPE html>
<html>
<head>
    <title>Memory Puzzle</title>
    <link rel="stylesheet" href="memorypuzzle.css">
</head>

<body>

    <h1>MEMORY PUZZLE</h1>

    <p id="message">Memorize the colours!</p>

    <div id="sequence"></div>

    <div id="buttons">
        <button class="colour red" data-color="RED"></button>
        <button class="colour blue" data-color="BLUE"></button>
        <button class="colour green" data-color="GREEN"></button>
        <button class="colour yellow" data-color="YELLOW"></button>
        <button class="colour black" data-color="BLACK"></button>
        <button class="colour white" data-color="WHITE"></button>
        <button class="colour purple" data-color="PURPLE"></button>
        <button class="colour orange" data-color="ORANGE"></button>
    </div>


<script src="memorypuzzle.js"></script>

</body>
</html>
